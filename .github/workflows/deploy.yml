name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build

      - name: Copy events data into OpenNext assets
        run: |
          mkdir -p .open-next/assets
          cp src/app/data/local-events.json .open-next/assets/events.json
          cp src/app/data/local-events.json .open-next/assets/local-events.json
          cp src/app/data/venues.json .open-next/assets/venues.json
          cp src/app/sitemap.ts .open-next/assets/sitemap.xml
          cp public/og-image.png .open-next/assets/

      - name: Deploy to Cloudflare Workers
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}